basePath: /api/v1
definitions:
  datastruct.CreateTeamRequest:
    properties:
      description:
        example: responsible for transactions
        type: string
      name:
        example: core
        type: string
    required:
    - description
    - name
    type: object
  datastruct.CreateTeamResponse:
    properties:
      status:
        example: status message
        type: string
    type: object
  datastruct.InviteUserToTeamRequest:
    properties:
      login:
        example: VaKadyk359
        type: string
    required:
    - login
    type: object
  datastruct.InviteUserToTeamResponse:
    properties:
      status:
        example: status message
        type: string
    type: object
  datastruct.ListUserTeamsResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/datastruct.TeamDescription'
        type: array
      status:
        example: status message
        type: string
    type: object
  datastruct.LoginRequest:
    properties:
      login:
        example: VaKadyk359
        type: string
      password:
        example: Xldf32Q
        type: string
    required:
    - login
    - password
    type: object
  datastruct.LoginResponse:
    properties:
      access_token:
        example: '-'
        type: string
      status:
        example: status message
        type: string
    type: object
  datastruct.RefreshResponse:
    properties:
      access_token:
        example: '-'
        type: string
      status:
        example: status message
        type: string
    type: object
  datastruct.RegisterRequest:
    properties:
      login:
        example: VaKadyk359
        type: string
      name:
        example: Vasilisa
        type: string
      password:
        example: Xldf32Q
        type: string
    required:
    - login
    - name
    - password
    type: object
  datastruct.RegisterResponse:
    properties:
      status:
        example: status message
        type: string
    type: object
  datastruct.Status:
    properties:
      status:
        example: status message
        type: string
    type: object
  datastruct.TeamDescription:
    properties:
      description:
        example: responsible for transactions
        type: string
      name:
        example: core
        type: string
      team_id:
        type: integer
    required:
    - description
    - name
    - team_id
    type: object
host: localhost:8080
info:
  contact:
    email: hhullen@gmail.com
    name: Maksim
    url: https://github.com/hhullen
  description: Service for managing teams and tasks
  license:
    name: Creative Commons Attribution-NonCommercial 4.0 International Public License
    url: https://creativecommons.org/licenses/by-nc/4.0/deed.en
  termsOfService: http://swagger.io/terms/
  title: Team Task Managere
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: login user.
      parameters:
      - description: login and password
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/datastruct.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      summary: login user
      tags:
      - Auth
  /refresh:
    post:
      description: refresh tokens.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      summary: refresh tokens
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: register new user.
      parameters:
      - description: login and password and info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/datastruct.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      summary: register new user
      tags:
      - Auth
  /teams:
    get:
      consumes:
      - application/json
      description: list teams the user member of .
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.ListUserTeamsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      security:
      - BearerAuth: []
      summary: list teams the user member of
      tags:
      - Teams
    post:
      consumes:
      - application/json
      description: create new team.
      parameters:
      - description: team description
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/datastruct.CreateTeamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.CreateTeamResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      security:
      - BearerAuth: []
      summary: create new team
      tags:
      - Teams
  /teams/{id}/invite:
    post:
      consumes:
      - application/json
      description: invite user to team .
      parameters:
      - description: team id
        in: path
        name: id
        required: true
        type: integer
      - description: team id and login of invited user
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/datastruct.InviteUserToTeamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/datastruct.InviteUserToTeamResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/datastruct.Status'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/datastruct.Status'
      security:
      - BearerAuth: []
      summary: invite user to team
      tags:
      - Teams
securityDefinitions:
  BearerAuth:
    description: Type 'Bearer <token>' to authenticate
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
